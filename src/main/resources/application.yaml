spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/blacklist
    username: aml_user
    password: aml_pass
 
  elasticsearch:
    uris: http://localhost:9200  

  jackson:
    serialization:
      write-dates-as-timestamps: false
  
  
   
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  
  web:
   resources:
    static-locations: classpath:/static/
  
  mvc:
   static-path-pattern: /**
    
    
  task:
    scheduling:
      pool:
        size: 5

  jwt:
    secret: my-super-secret-key-my-super-secret-key-my-super-secret-key
    expiration: 3600000 

sanctions:
  ofac:
    url: https://sanctionslistservice.ofac.treas.gov/api/PublicationPreview/exports/SDN.XML

server:
  port: 8000
  address: 0.0.0.0
  forward-headers-strategy: native





  # ── OpenAPI / Swagger ─────────────────────────────────────────────

app:
  server-url: https://api.risk-lens.net

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: ${SWAGGER_UI_ENABLED:true}       
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    display-request-duration: true
    persist-authorization: true
    try-it-out-enabled: true
  packages-to-scan: com.sdn.blacklist


  
