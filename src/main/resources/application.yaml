spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/risklens
    # url: jdbc:postgresql://10.16.150.55:5432/risklens
    username: aml_user
    password: wxBztzUvJv5sCNO
    # password: aml_pass
  elasticsearch:
    uris: http://localhost:9200  
    # uris: http://10.16.150.55:9200  

  jackson:
    serialization:
      write-dates-as-timestamps: false
  
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  
  web:
    resources:
      static-locations: classpath:/static/
  
  mvc:
    async:
      request-timeout: 1800000
    
  task:
    scheduling:
      pool:
        size: 5

  jwt:
    secret: my-super-secret-key-my-super-secret-key-my-super-secret-key
    expiration: 3600000 

  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true

sanctions:
  ofac:
    url: https://sanctionslistservice.ofac.treas.gov/api/PublicationPreview/exports/SDN.XML

server:
  port: 8000
  address: 0.0.0.0
  forward-headers-strategy: native
  http2:
    enabled: false
  tomcat:
    connection-timeout: 1800000

app:
  server-url: https://api.risk-lens.net

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: ${SWAGGER_UI_ENABLED:true}       
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    display-request-duration: true
    persist-authorization: true
    try-it-out-enabled: true
  packages-to-scan: com.sdn.blacklist



